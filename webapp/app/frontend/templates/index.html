<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ app_name }}</title>
    <link rel="stylesheet" href="{{ url_for('static', path='/css/app.css') }}">
</head>
<body>
    <main class="page-shell">
        <section class="hero">
            <div>
                <p class="eyebrow">Smart Lamp</p>
                <h1>{{ app_name }}</h1>
                <p class="hero-copy">查看同网段网关列表，并对当前选中的网关进行灯泡查看和控制。</p>
            </div>
            <div class="hero-actions">
                <div class="refresh-mode">
                    <div class="mode-switch" role="group" aria-label="刷新模式">
                        <button id="autoRefreshButton" class="button secondary is-active" type="button">自动刷新</button>
                        <button id="manualRefreshButton" class="button secondary" type="button">手动刷新</button>
                    </div>
                    <p id="refreshModeHint" class="refresh-hint">当前为自动刷新，每 5 秒更新一次。</p>
                </div>
                <button id="refreshStatusButton" class="button secondary" type="button">刷新状态</button>
            </div>
        </section>

        <div id="messageBanner" class="message" hidden></div>

        <section class="dashboard-layout">
            <aside class="panel side-panel">
                <div class="panel-header compact-header">
                    <div>
                        <h2>网关列表</h2>
                        <p class="panel-copy">点击切换控制对象。</p>
                    </div>
                </div>
                <div id="gatewayGrid" class="gateway-grid"></div>
            </aside>

            <div class="main-stack">
                <section class="panel status-panel">
                    <div class="panel-header compact-header">
                        <div>
                            <h2>当前网关</h2>
                            <p id="selectedGatewayLabel" class="panel-copy">尚未选中网关</p>
                        </div>
                        <span id="connectionBadge" class="badge offline">未选择</span>
                    </div>
                    <div id="gatewaySummary" class="summary-grid"></div>
                </section>

                <section class="panel">
                    <div class="panel-header compact-header">
                        <div>
                            <h2>全灯控制</h2>
                            <p id="globalControlHint" class="panel-copy">对当前网关下的全部灯泡统一设置颜色和亮度。</p>
                        </div>
                    </div>
                    <form id="globalControlForm" class="control-form">
                        <label class="color-wheel-field">
                            <span>颜色</span>
                            <div class="color-wheel">
                                <input id="globalColor" name="color" type="color" value="#ffffff">
                            </div>
                        </label>
                        <div class="brightness-group">
                            <label class="brightness-field">
                                <span>亮度</span>
                                <div class="brightness-inline">
                                    <input id="globalIntensity" name="intensity" type="range" min="0" max="255" value="255">
                                    <output id="globalIntensityValue">255</output>
                                </div>
                            </label>
                            <div class="form-actions control-actions">
                                <button class="button primary" type="submit">全部开启并应用</button>
                                <button id="turnAllOffButton" class="button danger" type="button">全部关闭</button>
                            </div>
                        </div>
                    </form>
                </section>

                <section class="panel">
                    <div class="panel-header compact-header">
                        <div>
                            <h2>灯泡列表</h2>
                            <p id="lampPanelHint" class="panel-copy">按当前网关下的灯泡单独查看和控制。</p>
                        </div>
                    </div>
                    <div id="lampGrid" class="lamp-grid"></div>
                </section>
            </div>
        </section>
    </main>

    <template id="gatewayCardTemplate">
        <button class="gateway-card" type="button">
            <div class="gateway-card-header">
                <span class="gateway-dot" aria-hidden="true"></span>
            </div>
            <div class="gateway-card-body">
                <h3 class="gateway-title"></h3>
                <p class="gateway-host"></p>
            </div>
        </button>
    </template>

    <template id="lampCardTemplate">
        <article class="lamp-card">
            <header class="lamp-card-header">
                <div>
                    <h3 class="lamp-title"></h3>
                    <p class="lamp-meta"></p>
                </div>
                <span class="lamp-badge"></span>
            </header>
            <div class="lamp-color-preview"></div>
            <dl class="lamp-stats">
                <div>
                    <dt>RGB</dt>
                    <dd class="lamp-rgb"></dd>
                </div>
                <div>
                    <dt>亮度</dt>
                    <dd class="lamp-intensity"></dd>
                </div>
            </dl>
            <form class="lamp-form">
                <input class="lamp-device-id" type="hidden" name="device_id">
                <label>
                    <span>颜色</span>
                    <input class="lamp-color-input" type="color" name="color">
                </label>
                <label>
                    <span>亮度</span>
                    <input class="lamp-intensity-input" type="range" name="intensity" min="0" max="255">
                    <output class="lamp-intensity-output"></output>
                </label>
                <div class="form-actions">
                    <button class="button primary" type="submit">应用到此灯</button>
                    <button class="button danger lamp-off-button" type="button">关闭此灯</button>
                </div>
            </form>
        </article>
    </template>

    <script src="{{ url_for('static', path='/js/app.js') }}" defer></script>
</body>
</html>
